version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: splitly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: splitly
    ports:
      - "5432:5432"
    volumes:
      - splitly_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d splitly"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  splitly_pg_data:
