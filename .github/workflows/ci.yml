name: CI & Deploy

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on branches/PRs to save minutes, but never cancel a
# run on main (it may be mid-deploy) — instead those queue and run serially.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  api-checks:
    name: API (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Prisma Client must be generated before typecheck/tests — the code
      # imports its generated types and runtime.
      - name: Generate Prisma Client
        run: npm run prisma:generate -w @splitly/api
      - name: Typecheck
        run: npm run lint -w @splitly/api
      - name: Test
        run: npm run test -w @splitly/api

  web-checks:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint -w @splitly/web
      - name: Build
        run: npm run build -w @splitly/web

  changes:
    name: Detect API changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'fly.toml'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  deploy-api:
    name: Deploy API to Fly.io
    needs: [api-checks, web-checks, changes]
    # Only on a push to main, only when API-relevant files changed, and only
    # after both check jobs pass (needs: gates on their success).
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
