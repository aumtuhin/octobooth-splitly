name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Prisma Client must be generated before typecheck/tests — the code
      # imports its generated types and runtime.
      - name: Generate Prisma Client
        run: npm run prisma:generate -w @splitly/api
      - name: Typecheck
        run: npm run lint -w @splitly/api
      - name: Test
        run: npm run test -w @splitly/api

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint -w @splitly/web
      - name: Build
        run: npm run build -w @splitly/web
