# Deploy from the monorepo root (fly.toml lives here on purpose — flyctl
# auto-discovers ./fly.toml, which avoids known bugs with --config pointing
# at a fly.toml in a subdirectory):
#   fly deploy .
#
# app: must be globally unique across all of Fly.io — change this before first deploy.
app = "splitly-api"
primary_region = "ams"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "4000"
  UPLOAD_DIR = "/data/uploads"
  # Comma-separated browser origins allowed by CORS. localhost (any port)
  # and the Capacitor mobile webviews are always allowed in code, so only
  # deployed web origins need listing here.
  CORS_ALLOWED_ORIGINS = "https://octobooth-splitly.dev-aumtuhin.workers.dev"

# Secrets (NOT set here — they contain credentials). Set via `fly secrets set`:
#   JWT_SECRET     - fly secrets set JWT_SECRET=...            --app splitly-api
#   DATABASE_URL   - Neon POOLED connection string (app runtime)
#   DIRECT_URL     - Neon DIRECT connection string (migrations)
# Both DB URLs must include ?sslmode=require.

# The volume is kept for uploaded receipt files (UPLOAD_DIR=/data/uploads).
# The database now lives in Neon Postgres, not on this volume.
[[mounts]]
  source = "splitly_data"
  destination = "/data"

# NOTE: migrations are intentionally NOT run via a [deploy] release_command.
# Fly release-command VMs do not mount volumes, so `prisma migrate deploy`
# there would apply the schema to a throwaway filesystem, leaving the real
# SQLite DB on the /data volume empty. Instead the container runs
# `prisma migrate deploy` at startup (see apps/api/Dockerfile CMD), where the
# volume IS mounted. `migrate deploy` is idempotent, so this is safe on every boot.

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
